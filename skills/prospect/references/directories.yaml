# directories.yaml
# Config-driven directory scraper definitions.
# Each entry defines a startup directory source and how to scrape it.
# The framework reads this config and dispatches to the appropriate scraper template.
#
# scrape_method: firecrawl | static_html | api | csv | browser
# template: webflow | wordpress | squarespace | generic | custom
# pagination.type: none | query_param | cursor | scroll | load_more
#
# Field mappings use CSS selectors (static_html/browser) or JSON paths (api/csv).
# Selectors marked "# guess" need refinement after initial scrape.

# =============================================================================
# WAVE 1 — Mega-directories (highest volume)
# =============================================================================

directories:

  # ---------------------------------------------------------------------------
  # 1. There's An AI For That (TAAFT)
  # ---------------------------------------------------------------------------
  - name: taaft
    label: "There's An AI For That"
    url: https://theresanaiforthat.com/companies/
    alt_urls:
      - https://theresanaiforthat.com/
      - https://theresanaiforthat.com/startups/
    scrape_method: firecrawl
    template: custom
    field_mapping:
      name: "h3.company-name, .tool-name"  # guess
      url: "a.company-link[href]"  # guess
      description: ".company-description, .tool-description"  # guess
      industry: ".company-category, .tag"  # guess
      stage: null
      team_size: null
    pagination:
      type: scroll
      param_name: null
      max_pages: 100
    estimated_yield: "3,000-6,000 companies"
    region: Global
    saas_percentage: 75
    refresh_interval_days: 14
    wave: 1
    enabled: true
    notes: >
      Server-rendered directory of AI companies. High volume but heavily
      AI-focused, so SaaS percentage is an estimate. Firecrawl needed for
      JS-rendered content. Infinite scroll pagination.

  # ---------------------------------------------------------------------------
  # 2. SaaSHub
  # ---------------------------------------------------------------------------
  - name: saashub
    label: SaaSHub
    url: https://saashub.com/startups
    alt_urls:
      - https://www.saashub.com/startups
      - https://saashub.com/
    scrape_method: static_html
    template: generic
    field_mapping:
      name: "h3 a, .startup-name a"  # guess
      url: "h3 a[href], .startup-name a[href]"  # guess
      description: ".startup-description, .description-text"  # guess
      industry: ".category-tag, .startup-category"  # guess
      stage: null
      team_size: null
    pagination:
      type: query_param
      param_name: page
      max_pages: 200
    estimated_yield: "5,000-15,000+ SaaS products"
    region: Global
    saas_percentage: 95
    refresh_interval_days: 7
    wave: 1
    enabled: true
    notes: >
      Server-rendered, paginated listing. Very high SaaS concentration since
      the entire directory is SaaS-focused. One of the highest-yield sources.

  # ---------------------------------------------------------------------------
  # 3. BetaList
  # ---------------------------------------------------------------------------
  - name: betalist
    label: BetaList
    url: https://betalist.com/
    alt_urls:
      - https://betalist.com/topics/saas
      - https://betalist.com/startups
    scrape_method: static_html
    template: generic
    field_mapping:
      name: "h2 a.startup_name, .startupCard__name"  # guess
      url: "a.startup_name[href], .startupCard__link[href]"  # guess
      description: ".startup_tagline, .startupCard__tagline"  # guess
      industry: ".startup_topics a, .tag"  # guess
      stage: null
      team_size: null
    pagination:
      type: query_param
      param_name: page
      max_pages: 150
    estimated_yield: "5,000-8,000 startups"
    region: Global
    saas_percentage: 65
    refresh_interval_days: 7
    wave: 1
    enabled: true
    notes: >
      Large directory of early-stage startups. Use /topics/saas for
      SaaS-specific filtering. Many pre-launch companies, so quality
      varies. Good for discovering very early-stage prospects.

  # ---------------------------------------------------------------------------
  # 4. StackShare CSV
  # ---------------------------------------------------------------------------
  - name: stackshare_csv
    label: StackShare CSV
    url: https://github.com/nicholasgasior/stackshare-dataset
    alt_urls:
      - https://raw.githubusercontent.com/nicholasgasior/stackshare-dataset/master/data.csv
    scrape_method: csv
    template: custom
    field_mapping:
      name: "name"  # CSV column
      url: "url"  # CSV column
      description: "description"  # CSV column
      industry: "category"  # CSV column
      stage: null
      team_size: null
    pagination:
      type: none
      param_name: null
      max_pages: 1
    estimated_yield: "2,000-3,000 tools/companies"
    region: Global
    saas_percentage: 80
    refresh_interval_days: 90
    wave: 1
    enabled: true
    notes: >
      CSV download from GitHub. Static dataset, so refresh is infrequent.
      Good for cross-referencing tech stack data. Column names need
      verification after initial download.

